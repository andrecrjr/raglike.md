services:
  db:
    image: ankane/pgvector:latest
    environment:
      - POSTGRES_DB=raglike
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d raglike"]
      interval: 5s
      timeout: 5s
      retries: 5

  raglike-md:
    build:
      context: .
      args:
        - EMBEDDING_MODEL=${EMBEDDING_MODEL:-Xenova/jina-embeddings-v2-base-en}
    ports:
      - "4321:4321"
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./docs:/app/docs
      - ./.logs:/app/.logs
      - ./.db:/app/.db
      - ./src:/app/src
      - ./index.html:/app/index.html
    restart: unless-stopped

volumes:
  pgdata:
